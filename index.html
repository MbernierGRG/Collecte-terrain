<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Collecte terrain - GRG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body { 
        font-family: Arial, sans-serif;
        background: #E6F0FF;
        margin: 0;
        padding: 0;
    }

    .header {
        background: #005CB9;
        padding: 15px;
        text-align: center;
    }

    .header img { max-height: 60px; }

    .card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        max-width: 520px;
        margin: 25px auto;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        border-left: 6px solid #E63946;
    }

    h2 {
        color: #005CB9;
        margin-bottom: 10px;
        text-align: center;
        font-size: 24px;
    }

    label {
        font-weight: bold;
        color: #1F1F1F;
        display: block;
        margin-top: 15px;
    }

    input, textarea, select {
        width: 100%;
        margin-top: 8px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #9CA3AF;
        background: #F9FAFB;
        font-size: 16px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 15px;
        background: #E63946;
        color: white;
        border: none;
        margin-top: 20px;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }
    button:hover { background: #C12937; }

    #status {
        text-align: center;
        margin-top: 15px;
        font-weight: bold;
        color: #005CB9;
    }
</style>
</head>

<body>

<div class="header">
    <img src="https://propanegrg.com/wp-content/uploads/2018/05/logo.png" alt="Logo GRG">
</div>

<div class="card">
    <h2>Collecte d'information terrain</h2>

    <label>Nom du livreur</label>
    <input id="name" type="text">

    <label>No magasin</label>
    <input id="store" type="text">

    <label>Raison</label>
    <select id="reason">
        <option value="">-- Choisir une raison --</option>
        <option value="Neige">Neige</option>
        <option value="Note / Point GPS">Note / Point GPS</option>
        <option value="No de série">No de série</option>
        <option value="Tink rouillé / À redresser">Tink rouillé / À redresser</option>
        <option value="Bris camion">Bris camion</option>
        <option value="Échelle">Échelle</option>
        <option value="Couvercle">Couvercle</option>
        <option value="Autre">Autre</option>
    </select>

    <label>Description</label>
    <textarea id="description" rows="4"></textarea>

    <label>Photos</label>
    <input id="photos" type="file" multiple accept="image/*">

    <button onclick="sendData()">📤 Envoyer</button>
    <p id="status"></p>
</div>

<script>
async function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]); 
        reader.onerror = (error) => reject(error);
    });
}

async function sendData() {
    let status = document.getElementById("status");
    status.innerText = "Envoi en cours...";

    const filesInput = document.getElementById('photos').files;
    const filesArray = [];

    for (let i = 0; i < filesInput.length; i++) {
        const file = filesInput[i];
        const base64 = await fileToBase64(file);
        filesArray.push({
            filename: file.name,
            contentBase64: base64
        });
    }

    const payload = {
        name: document.getElementById("name").value,
        store: document.getElementById("store").value,
        reason: document.getElementById("reason").value,
        description: document.getElementById("description").value,
        files: filesArray
    };

    try {
        const res = await fetch("https://default07701cb9af5347039146bbc568caf4.a9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/27bc1969e5074e17b6aa8ccef4bc91b8/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=v6A6fj7mCzQ94O3fUhjzR96YgEEGE3lUM3mV08-mQ4U", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        status.innerText = res.ok ? "✔️ Envoyé avec succès !" : "❌ Erreur d’envoi.";
    } catch (e) {
        status.innerText = "❌ Impossible d'envoyer.";
    }
}
</script>

</body>
</html>
``
